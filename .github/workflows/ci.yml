name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://kajinagi0001-bit.github.io/Skill-notes/' }}
          BASE_PATH: ${{ vars.BASE_PATH || '/Skill-notes' }}
        run: npm run validate
